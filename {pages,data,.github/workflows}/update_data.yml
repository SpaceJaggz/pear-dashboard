# .github/workflows/update_data.yml
# Runs daily to fetch fresh data from Pear Protocol API

name: Update Dashboard Data

on:
  schedule:
    # Run daily at 00:00 UTC (07:00 GMT+7)
    # Note: GitHub Actions may delay cron by up to a few hours
    - cron: '0 0 * * *'
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install requests pandas

      - name: Run data fetcher
        env:
          AMBASSADORS_CSV_URL: ${{ secrets.AMBASSADORS_CSV_URL }}
          VIPS_CSV_URL: ${{ secrets.VIPS_CSV_URL }}
        run: |
          python fetch_data.py

      - name: Commit and push updated data
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/
          git diff --staged --quiet && echo "No changes to commit" && exit 0
          git commit -m "📊 Update dashboard data $(date -u +%Y-%m-%d)"
          git fetch origin main
          git rebase origin/main || git rebase --abort
          git push origin main --force-with-lease || git push origin main --force
